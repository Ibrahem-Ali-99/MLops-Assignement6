name: Gatekeeper
on:
  push:

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install flake8
        run: pip install flake8

      - name: Linter Run
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint error log
        if: failure()
        run: echo "Linter failed" > lint_error_log.txt

      - name: Upload lint error log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-error-log
          path: lint_error_log.txt

  train:
    runs-on: ubuntu-latest
    needs: linter
    if: github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[run-train]')
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Training job
        run: echo "Starting GPU heavy task"

      - name: Error logs
        if: failure()
        run: echo "Training failed" > error_log.txt

      - name: Upload error logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-log
          path: error_log.txt

      - name: Cleanup
        if: always()
        run: echo "Cleaning..."
